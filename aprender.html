<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Na Minha Forma de Aprender – Nexaplus</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --roxo: #ffffff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background: radial-gradient(circle at center, rgb(7, 7, 7) 0%, #696969 100% ); }

    header {
      background:rgb(150, 150, 150); border-bottom:3px solid rgb(0, 0, 0);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 40px; height:68px;
      position:sticky; top:0; z-index:100;
    }
    .logo { font-family:'Baloo 2',cursive; font-size:1.5rem; font-weight:800; color:rgb(255, 255, 255); text-decoration:none; display:flex; align-items:center; gap:8px; }
    .logo span { color:rgb(255, 255, 255); }
    .back-btn { display:flex; align-items:center; gap:8px; color:rgb(0, 0, 0); font-weight:700; text-decoration:none; font-size:0.95rem; border:2px solid rgb(0, 0, 0); padding:8px 18px; border-radius:50px; transition:all 0.2s; }
    .back-btn:hover { background:rgb(0, 0, 0); color:white; }

    .page-hero {
      background: linear-gradient(135deg, #f3de9b 0%, #bbabd7 100%);
      padding:60px 40px 50px; text-align:center;
    }
    .page-hero .icon { font-size:64px; margin-bottom:16px; display:block; animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
    .page-hero h1 { font-family:'Baloo 2',cursive; font-size:2.4rem; font-weight:800; color:rgb(255, 0, 0) 0%; margin-bottom:12px; }
    .page-hero p { font-size:1.05rem; color:#000000; max-width:600px; margin:0 auto; line-height:1.7; }

    .container { max-width:1100px; margin:0 auto; padding:40px; }
