<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPlus - Ensino para Cada Mente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET E VARIÁVEIS ===== */
     *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }
        :root {
          --bg-overlay: rgba(0, 0, 0, 0.7);
            --white: #ffffff;
            --black: #000000;
            --cream: #ffffff;
            --accent-green: #f3DF9A;
            --accent-blue: #CC9699;
            --text-muted: #e2c4ff;
            --nav-purple: #000000;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--black);
            overflow-x: hidden;
        }
        
        /* ===== NAVBAR CORRIGIDA ===== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 10px;
            background: var(--nav-purple);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid 
    rgba(255,255,255,0.1);
            min-height: 110px; /* Altura para acomodar a logo grande */
        }
        .logo-area {
            display: flex;
            align-items: center;
        }
         .nav-logo-img {
            height: 100px; /* Aumentado para destaque */
             width: auto;
            display: block;
            /* mix-blend-mode: multiply; /* Remove o fundo branco da imagem */
            transition: transform 0.3s ease;
        }
        .nav-logo-img:hover {
            transform: scale(1.05);
        }
        .btn-login {
            padding: 12px 28px;
            background: var(--black);
            color: var(--white);
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .btn-login:hover {
            background: var(--white);
            color: var(--black);
        }
         /* ===== HERO SECTION ===== */
        .hero {
            min-height: 100vh;
            /* Se você tiver a imagem de fundo, altere o caminho abaixo */
            background: #ffffff; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 140px 40px 80px;
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgb(7, 7, 7) 0%, #696969 100% );
        }
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            animation: heroFadeIn 0.9s ease both;
        }
          /* Logo Central (Infinito) */
        .hero-logo-main {
            display: block;
            width: 100%;
            max-width: 450px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.15));
            animation: floatAnim 4s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes heroFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .badge {
            display: inline-flex;
            padding: 8px 20px;
            background: rgba(243, 223, 154, 0.15);
            border: 1px solid var(--accent-green);
            border-radius: 50px;
            font-family: 'Sora', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
           .subtitle {
            font-size: 1.2rem;
            color: var(--white);
            opacity: 0.85;
            line-height: 1.6;
            max-width: 600px;
        }
            /* ===== BOTÕES ===== */
        .cta-buttons {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 35px;
            border-radius: 15px;
            font-family: 'Sora', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .btn-professor {
            background: var(--accent-green);
            color: var(--black);
        }

        .btn-aluno {
            background: var(--accent-blue);
            color: var(--white);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255,255,255,0.1);
        }
             .btn-saibamais {
            margin-top: 10px;
            padding: 10px 30px;
            border: 1px solid var(--white);
            border-radius: 50px;
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
         .btn-saibamais:hover {
            background: var(--white);
            color: var(--black);
        }

        .description {
            font-size: 0.9rem;
            color: var(--accent-green);
            opacity: 0.7;
            font-style: italic;
        }
           /* Responsividade */
        @media (max-width: 768px) {
            .navbar { padding: 10px 25px; min-height: 90px; }
            .nav-logo-img { height: 60px; }
            .cta-buttons { flex-direction: column; width: 100%; }
            .btn { width: 100%; justify-content: center; }
            .hero-logo-main { max-width: 300px; }
        }
    </style>

    
</head>
    
<body>
    <div class="accessibility-bar">
        <script>
            (function(d){
                var s = d.createElement("script");
                s.setAttribute("data-account","YOUR_USERWAY_ACCOUNT");
                s.setAttribute("src","https://cdn.userway.org/widget.js");
                (d.body || d.head).appendChild(s);
            })(document);
        </script>
        <div vw class="enabled">
            <div vw-access-button class="active"></div>
            <div vw-plugin-wrapper>
                <div class="vw-plugin-top-wrapper"></div>
            </div>
        </div>
        <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
        <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
    </div>

    <header class="navbar">
        <div class="logo-area">
            <a href="index.html">
                <img src="icon.png" alt="Nexaplus Logo" class="nav-logo-img">
            </a>
        </div>
      
    </header>

    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <div class="badge">✦ Tecnologia & Inclusão</div>
            
            <img src="infinity.png" alt="Nexaplus Infinito" class="hero-logo-main">

            <p class="subtitle">
                Transformando a aprendizagem de estudantes atípicos com Inteligência Artificial adaptativa.
            </p>

            <div class="cta-buttons">
                <a href="#" class="btn btn-professor" id="btn-professor">
                    <span>🎓</span> Sou Professor
                </a>
                <a href="#" class="btn btn-aluno" id="btn-aluno">
                    <span>📚</span> Sou Aluno
                </a>
            </div>

            <a href="saibamais.html" target="_blank" class="btn-saibamais">
                Conheça o Projeto
            </a>

            <p class="description">
                Ambiente acolhedor e inteligente para alunos com TEA, TDAH e outras necessidades específicas.
            </p>
        </div>
    </section>

    <script>
        // Lógica de Redirecionamento
        document.getElementById('btn-professor').addEventListener('click', function(e) {
            e.preventDefault();
            const temPerfil = localStorage.getItem('professorNome');
            if (temPerfil) {
                window.location.href = 'professor.html?direct=true';
            } else {
                localStorage.setItem('perfil', 'professor');
                window.location.href = 'professor.html';
            }
        });

        document.getElementById('btn-aluno').addEventListener('click', function(e) {
            e.preventDefault();
            const temNome = localStorage.getItem('alunoNome');
            const temPerfil = localStorage.getItem('perfilAluno');
            if (temNome && temPerfil) {
                window.location.href = 'aluno.html?direct=true';
            } else {
                localStorage.setItem('perfil', 'aluno');
                window.location.href = 'aluno.html';
            }
        });

        const btnNav = document.getElementById('btn-login-nav');
        const savedRole = localStorage.getItem('userRole');
        const savedNomeProf = localStorage.getItem('professorNome');
        const savedNomeAluno = localStorage.getItem('alunoNome');

        if (savedRole === 'professor' && savedNomeProf) {
            btnNav.href = 'professor.html?direct=true';
            btnNav.textContent = 'Minha Conta';
        } else if (savedRole === 'aluno' && savedNomeAluno) {
            btnNav.href = 'aluno.html?direct=true';
            btnNav.textContent = 'Minha Conta';
        }
    </script>
</body>
</html>
