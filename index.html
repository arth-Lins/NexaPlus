<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPlus - Ensino para Cada Mente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET E VARIÁVEIS ===== */
     *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --bg:       #0d0d10;
            --surface:  #141418;
            --surface2: #1c1c22;
            --border:   rgba(255,255,255,0.07);
            --border2:  rgba(255,255,255,0.12);
            --cream:    #f3df9a;
            --mint:     #b6dcc7;
            --rose:     #cd9699;
            --lavender: #bbabd7;
            --white:    #ffffff;
            --text:     #e2e0ea;
            --muted:    rgba(255,255,255,0.45);
            --subtle:   rgba(255,255,255,0.22);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }
        
        /* ===== NAVBAR CORRIGIDA ===== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            background: rgba(13,13,16,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            height: 80px;
        }

        .nav-logo-img {
            height: 52px;
            width: auto;
            display: block;
            transition: transform 0.3s ease, filter 0.3s;
    
        }
        .nav-logo-img:hover { transform: scale(1.06); filter: drop-shadow(0 0 16px rgba(183,221,200,0.35)); }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link {
            color: var(--muted);
            font-size: 0.88rem;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 10px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .nav-link:hover { color: var(--white); background: rgba(255,255,255,0.06); }

         /* ===== HERO SECTION ===== */
        .hero {
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 40px 80px;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(183,221,200,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 60%, rgba(187,171,215,0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 20% 70%, rgba(205,150,153,0.07) 0%, transparent 40%),
                var(--bg);
        }

        /*Decorative orbs*/
        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(60px);
        }
        .orb-1 { width:400px; height:400px; top:-100px; left:-80px; background: rgba(183,221,200,0.07); animation: drift1 12s ease-in-out infinite; }
        .orb-2 { width:300px; height:300px; bottom:0; right:-60px; background: rgba(187,171,215,0.07); animation: drift2 15s ease-in-out infinite; }
        .orb-3 { width:200px; height:200px; top:40%; left:20%; background: rgba(243,223,154,0.04); animation: drift1 18s ease-in-out infinite reverse; }

        @keyframes drift1 {
            0%,100% { transform: translate(0,0); }
            50%      { transform: translate(30px, 20px); }
        }
        @keyframes drift2 {
            0%,100% { transform: translate(0,0); }
            50%      { transform: translate(-25px, -30px); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 760px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            animation: heroIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes heroIn {
            from { opacity: 0; transform: translateY(36px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 22px;
            background: rgba(183,221,200,0.08);
            border: 1px solid rgba(183,221,200,0.22);
            border-radius: 50px;
            font-family: 'Sora', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--mint);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .badge::before { content: '✦'; }

        .hero-logo-main {
            width: 100%;
            max-width: 380px;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(183,221,200,0.18)) drop-shadow(0 20px 60px rgba(0,0,0,0.5));
            animation: float 5s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-14px); }
        }

        .hero-tagline {
            font-family: 'Sora', sans-serif;
            font-size: 1.25rem;
            font-weight: 300;
            color: var(--muted);
            line-height: 1.65;
            max-width: 540px;
            letter-spacing: -0.01em;
        }
        .hero-tagline strong { color: var(--white); font-weight: 600; }
        
            /* ===== BOTÕES ===== */
        .cta-buttons {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 35px;
            border-radius: 15px;
            font-family: 'Sora', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .btn-professor {
            background: var(--accent-green);
            color: var(--black);
        }

        .btn-aluno {
            background: var(--accent-blue);
            color: var(--white);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255,255,255,0.1);
        }
             .btn-saibamais {
            margin-top: 10px;
            padding: 10px 30px;
            border: 1px solid var(--white);
            border-radius: 50px;
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
         .btn-saibamais:hover {
            background: var(--white);
            color: var(--black);
        }
        
           /* Responsividade */
        @media (max-width: 768px) {
            .navbar { padding: 10px 25px; min-height: 90px; }
            .nav-logo-img { height: 60px; }
            .cta-buttons { flex-direction: column; width: 100%; }
            .btn { width: 100%; justify-content: center; }
            .hero-logo-main { max-width: 300px; }
        }
    </style>

    
</head>
    
<body>
    <div class="accessibility-bar">
        <script>
            (function(d){
                var s = d.createElement("script");
                s.setAttribute("data-account","YOUR_USERWAY_ACCOUNT");
                s.setAttribute("src","https://cdn.userway.org/widget.js");
                (d.body || d.head).appendChild(s);
            })(document);
        </script>
        <div vw class="enabled">
            <div vw-access-button class="active"></div>
            <div vw-plugin-wrapper>
                <div class="vw-plugin-top-wrapper"></div>
            </div>
        </div>
        <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
        <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
    </div>

    <header class="navbar">
        <div class="logo-area">
            <a href="index.html">
                <img src="icon.png" alt="Nexaplus Logo" class="nav-logo-img">
            </a>
        </div>
      
    </header>

    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <div class="badge">✦ Tecnologia & Inclusão</div>
            
            <img src="infinity.png" alt="Nexaplus Infinito" class="hero-logo-main">

            <p class="subtitle">
                Transformando a aprendizagem de estudantes atípicos com Inteligência Artificial adaptativa.
            </p>

            <div class="cta-buttons">
                <a href="#" class="btn btn-professor" id="btn-professor">
                    <span>🎓</span> Sou Professor
                </a>
                <a href="#" class="btn btn-aluno" id="btn-aluno">
                    <span>📚</span> Sou Aluno
                </a>
            </div>

            <a href="saibamais.html" target="_blank" class="btn-saibamais">
                Conheça o Projeto
            </a>
            
        </div>
    </section>

    <script>
        // Lógica de Redirecionamento
        document.getElementById('btn-professor').addEventListener('click', function(e) {
            e.preventDefault();
            const temPerfil = localStorage.getItem('professorNome');
            if (temPerfil) {
                window.location.href = 'professor.html?direct=true';
            } else {
                localStorage.setItem('perfil', 'professor');
                window.location.href = 'professor.html';
            }
        });

        document.getElementById('btn-aluno').addEventListener('click', function(e) {
            e.preventDefault();
            const temNome = localStorage.getItem('alunoNome');
            const temPerfil = localStorage.getItem('perfilAluno');
            if (temNome && temPerfil) {
                window.location.href = 'aluno.html?direct=true';
            } else {
                localStorage.setItem('perfil', 'aluno');
                window.location.href = 'aluno.html';
            }
        });

        const btnNav = document.getElementById('btn-login-nav');
        const savedRole = localStorage.getItem('userRole');
        const savedNomeProf = localStorage.getItem('professorNome');
        const savedNomeAluno = localStorage.getItem('alunoNome');

        if (savedRole === 'professor' && savedNomeProf) {
            btnNav.href = 'professor.html?direct=true';
            btnNav.textContent = 'Minha Conta';
        } else if (savedRole === 'aluno' && savedNomeAluno) {
            btnNav.href = 'aluno.html?direct=true';
            btnNav.textContent = 'Minha Conta';
        }
    </script>
</body>
</html>
