<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPlus - Ensino para Cada Mente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET E VARIÁVEIS ===== */
     *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --bg:       #0d0d10;
            --surface:  #141418;
            --surface2: #1c1c22;
            --border:   rgba(255,255,255,0.07);
            --border2:  rgba(255,255,255,0.12);
            --cream:    #f3df9a;
            --mint:     #b6dcc7;
            --rose:     #cd9699;
            --lavender: #bbabd7;
            --white:    #ffffff;
            --text:     #e2e0ea;
            --muted:    rgba(255,255,255,0.45);
            --subtle:   rgba(255,255,255,0.22);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }
        
        /* ===== NAVBAR CORRIGIDA ===== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            background: rgba(13,13,16,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            height: 80px;
        }

        .nav-logo-img {
            height: 52px;
            width: auto;
            display: block;
            transition: transform 0.3s ease, filter 0.3s;
    
        }
        .nav-logo-img:hover { transform: scale(1.06); filter: drop-shadow(0 0 16px rgba(183,221,200,0.35)); }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link {
            color: var(--muted);
            font-size: 0.88rem;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 10px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .nav-link:hover { color: var(--white); background: rgba(255,255,255,0.06); }

         /* ===== HERO SECTION ===== */
        .hero {
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 40px 80px;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(183,221,200,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 60%, rgba(187,171,215,0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 20% 70%, rgba(205,150,153,0.07) 0%, transparent 40%),
                var(--bg);
        }

        /*Decorative orbs*/
        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(60px);
        }
        .orb-1 { width:400px; height:400px; top:-100px; left:-80px; background: rgba(183,221,200,0.07); animation: drift1 12s ease-in-out infinite; }
        .orb-2 { width:300px; height:300px; bottom:0; right:-60px; background: rgba(187,171,215,0.07); animation: drift2 15s ease-in-out infinite; }
        .orb-3 { width:200px; height:200px; top:40%; left:20%; background: rgba(243,223,154,0.04); animation: drift1 18s ease-in-out infinite reverse; }

        @keyframes drift1 {
            0%,100% { transform: translate(0,0); }
            50%      { transform: translate(30px, 20px); }
        }
        @keyframes drift2 {
            0%,100% { transform: translate(0,0); }
            50%      { transform: translate(-25px, -30px); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 760px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            animation: heroIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes heroIn {
            from { opacity: 0; transform: translateY(36px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 22px;
            background: rgba(183,221,200,0.08);
            border: 1px solid rgba(183,221,200,0.22);
            border-radius: 50px;
            font-family: 'Sora', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--mint);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .badge::before { content: '✦'; }

        .hero-logo-main {
            width: 100%;
            max-width: 380px;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(183,221,200,0.18)) drop-shadow(0 20px 60px rgba(0,0,0,0.5));
            animation: float 5s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-14px); }
        }

        .hero-tagline {
            font-family: 'Sora', sans-serif;
            font-size: 1.25rem;
            font-weight: 300;
            color: var(--muted);
            line-height: 1.65;
            max-width: 540px;
            letter-spacing: -0.01em;
        }
        .hero-tagline strong { color: var(--white); font-weight: 600; }
        
            /* ===== BOTÕES ===== */
        .cta-buttons {
            display: flex;
            gap: 16px;
            margin-top: 4px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 34px;
            border-radius: 14px;
            font-family: 'Sora', sans-serif;
            font-size: 0.97rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
            letter-spacing: -0.01em;
        }

        .btn-professor {
            background: var(--cream);
            color: #1a1200;
            box-shadow: 0 4px 20px rgba(243,223,154,0.2);
        }
        .btn-professor:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 32px rgba(243,223,154,0.35);
            background: #f7e8b0;
        }

        .btn-aluno {
            background: var(--rose);
            color: #fff;
            box-shadow: 0 4px 20px rgba(205,150,153,0.2);
        }
        .btn-aluno:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 32px rgba(205,150,153,0.35);
            background: #d9a5a8;
        }

        .scroll-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            opacity: 0.45;
            transition: opacity 0.3s;
            margin-top: 4px;
        }
        .scroll-hint:hover { opacity: 0.8; }
        .scroll-hint span {
            font-size: 0.72rem;
            color: var(--cream);
            font-family: 'Sora', sans-serif;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .scroll-arrow {
            width: 22px; height: 22px;
            border-right: 1.5px solid var(--cream);
            border-bottom: 1.5px solid var(--cream);
            transform: rotate(45deg);
            animation: arrowBounce 1.6s ease-in-out infinite;
        }
        @keyframes arrowBounce {
            0%,100% { transform: rotate(45deg) translateY(0); }
            50%      { transform: rotate(45deg) translateY(5px); }
        }

                /* ===== DIVIDER ===== */
        .gradient-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--mint), var(--lavender), var(--rose), transparent);
            opacity: 0.4;
        }

        /* ===== SAIBA MAIS ===== */
        #saiba-mais {
            background: var(--bg);
        }

        .section-hero {
            background: linear-gradient(160deg, rgba(183,221,200,0.07) 0%, rgba(187,171,215,0.05) 100%);
            padding: 70px 40px 50px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .section-hero .s-icon { font-size: 56px; margin-bottom: 18px; display: block; animation: sway 3s ease-in-out infinite; }
        @keyframes sway { 0%,100%{transform:rotate(-4deg);} 50%{transform:rotate(4deg);} }
        .section-hero h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--white);
            margin-bottom: 14px;
            letter-spacing: -0.02em;
        }
        .section-hero p {
            font-size: 1rem;
            color: var(--muted);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.72;
        }

        /* ===== CONTAINER ===== */
        .sm-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 56px 40px 88px;
        }

        /* ===== SECTION HEADER ===== */
        .section-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 54px 0 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .section-header .s-icon { font-size: 32px; }
        .section-header h2 {
            font-family: 'Baloo 2', cursive;
            font-size: 1.5rem;
            color: var(--white);
            letter-spacing: -0.01em;
        }
        .section-header p { font-size: 0.88rem; color: var(--muted); margin-top: 2px; }

        /* ===== SOBRE ===== */
        .sobre-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            margin-bottom: 60px;
        }
        .sobre-texto h2 {
            font-family: 'Baloo 2', cursive;
            font-size: 1.8rem;
            color: var(--white);
            margin-bottom: 18px;
            letter-spacing: -0.02em;
        }
        .sobre-texto p { font-size: 0.96rem; color: var(--muted); line-height: 1.78; margin-bottom: 16px; }
        .sobre-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
        .s-tag {
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.82rem;
            border: 1px solid transparent;
        }

        /* ===== PLACEHOLDER ===== */
        .img-placeholder {
            border-radius: 20px;
            background: var(--surface);
            border: 1px dashed rgba(255,255,255,0.14);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; color: var(--subtle);
            min-height: 260px; cursor: pointer; transition: all 0.3s;
            text-align: center; padding: 30px;
        }
        .img-placeholder:hover { background: var(--surface2); border-color: rgba(183,221,200,0.25); }
        .img-placeholder .ph-icon { font-size: 44px; opacity: 0.5; }
        .img-placeholder h3 { font-family: 'Baloo 2', cursive; font-size: 1rem; color: var(--muted); }
        .img-placeholder p { font-size: 0.82rem; color: var(--subtle); max-width: 220px; }

        .video-placeholder {
            border-radius: 20px;
            background: var(--surface);
            border: 1px dashed rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 14px; color: var(--muted); min-height: 280px; cursor: pointer;
            transition: all 0.3s; text-align: center; padding: 30px; position: relative;
            overflow: hidden;
        }
        .video-placeholder:hover { background: var(--surface2); border-color: rgba(183,221,200,0.2); }
        .video-placeholder:hover .play-btn { transform: scale(1.1); background: rgba(183,221,200,0.15); }
        .play-btn {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; border: 1px solid rgba(255,255,255,0.12);
            transition: all 0.3s;
        }
        .video-placeholder h3 { font-family: 'Baloo 2', cursive; font-size: 1.05rem; color: var(--white); }
        .video-placeholder p { font-size: 0.84rem; color: var(--muted); }
        .video-tag {
            position: absolute; top: 16px; left: 16px;
            background: rgba(183,221,200,0.12);
            color: var(--mint);
            padding: 4px 14px; border-radius: 50px; font-size: 0.72rem; font-weight: 700;
            border: 1px solid rgba(183,221,200,0.2);
        }

        .videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 20px; margin-bottom: 40px; }
        .imagens-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 18px; margin-bottom: 40px; }

        /* ===== TEXTOS ===== */
        .texto-placeholder {
            border-radius: 18px;
            border: 1px dashed rgba(255,255,255,0.1);
            background: var(--surface);
            padding: 36px;
            min-height: 180px;
            transition: all 0.3s;
        }
        .texto-placeholder:hover { background: var(--surface2); }
        .texto-placeholder h3 { font-family: 'Baloo 2', cursive; font-size: 1.1rem; color: var(--white); margin-bottom: 12px; }
        .texto-placeholder p.hint { color: var(--subtle); font-size: 0.9rem; line-height: 1.65; }
        .texto-placeholder .edit-icon { font-size: 26px; margin-bottom: 8px; display: block; }

        /* ===== VALORES ===== */
        .valores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 18px; margin-bottom: 40px; }
        .valor-card {
            background: var(--surface);
            border-radius: 20px; padding: 28px 24px;
            border: 1px solid var(--border);
            border-top: 3px solid var(--mint);
            transition: all 0.3s;
        }
        .valor-card:hover { transform: translateY(-5px); box-shadow: 0 12px 36px rgba(0,0,0,0.4); border-color: var(--border2); }
        .valor-icon { font-size: 38px; margin-bottom: 14px; }
        .valor-card h3 { font-family: 'Baloo 2', cursive; font-size: 1.05rem; color: var(--white); margin-bottom: 8px; }
        .valor-card p { font-size: 0.88rem; color: var(--muted); line-height: 1.65; }

        /* ===== EQUIPE ===== */
        .equipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 18px; margin-bottom: 50px; }
        .equipe-card {
            background: var(--surface);
            border-radius: 20px; padding: 28px 20px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .equipe-card:hover { transform: translateY(-4px); border-color: var(--border2); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
        .equipe-foto {
            width: 88px; height: 88px;
            border-radius: 50%;
            margin: 0 auto 16px;
            object-fit: cover;
            border: 2.5px solid rgba(183,221,200,0.3);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .equipe-card h3 { font-family: 'Baloo 2', cursive; font-size: 0.97rem; color: var(--white); margin-bottom: 5px; }
        .equipe-card p { font-size: 0.8rem; color: var(--muted); }

        /* ===== TIMELINE ===== */
        .timeline { position: relative; padding-left: 32px; margin-bottom: 50px; }
        .timeline::before {
            content: ''; position: absolute; left: 14px; top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--mint), var(--lavender), var(--rose));
            border-radius: 2px; opacity: 0.4;
        }
        .tl-item { position: relative; margin-bottom: 28px; }
        .tl-dot {
            position: absolute; left: -24px; width: 14px; height: 14px; border-radius: 50%;
            background: var(--mint); border: 2px solid var(--surface);
            box-shadow: 0 0 0 3px rgba(183,221,200,0.2); top: 5px;
        }
        .tl-content {
            background: var(--surface); border-radius: 16px; padding: 20px 24px;
            border: 1px solid var(--border);
        }
        .tl-content h3 { font-family: 'Baloo 2', cursive; color: var(--white); margin-bottom: 6px; }
        .tl-content p { font-size: 0.9rem; color: var(--muted); line-height: 1.65; }
        .tl-date { font-size: 0.76rem; color: var(--mint); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.04em; }

        /* ===== FOOTER ===== */
        .site-footer {
            text-align: center; padding: 28px 20px;
            font-size: 0.85rem; color: var(--subtle);
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        .site-footer strong { color: var(--mint); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .navbar { height: 70px; }
            .cta-buttons { flex-direction: column; width: 100%; }
            .btn { width: 100%; justify-content: center; }
            .sobre-grid { grid-template-columns: 1fr; }
            .sm-container { padding: 36px 20px 60px; }
        }
        @media (max-width: 600px) {
            .videos-grid, .imagens-grid { grid-template-columns: 1fr; }
            .equipe-grid { grid-template-columns: 1fr 1fr; }
        }

        
    </style>

    
</head>
    <!-- ACESSIBILIDADE-->
<body>
    <div class="accessibility-bar">
        <script>
            (function(d){
                var s = d.createElement("script");
                s.setAttribute("data-account","YOUR_USERWAY_ACCOUNT");
                s.setAttribute("src","https://cdn.userway.org/widget.js");
                (d.body || d.head).appendChild(s);
            })(document);
        </script>
        <div vw class="enabled">
            <div vw-access-button class="active"></div>
            <div vw-plugin-wrapper>
                <div class="vw-plugin-top-wrapper"></div>
            </div>
        </div>
        <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
        <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
    </div>

    <header class="navbar">
        <div class="logo-area">
            <a href="index.html">
                <img src="icon.png" alt="Nexaplus Logo" class="nav-logo-img">
            </a>
        </div>
      
    </header>

    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <div class="badge">✦ Tecnologia & Inclusão</div>
            
            <img src="infinity.png" alt="Nexaplus Infinito" class="hero-logo-main">

            <p class="subtitle">
                Transformando a aprendizagem de estudantes atípicos com Inteligência Artificial adaptativa.
            </p>

            <div class="cta-buttons">
                <a href="#" class="btn btn-professor" id="btn-professor">
                    <span>🎓</span> Sou Professor
                </a>
                <a href="#" class="btn btn-aluno" id="btn-aluno">
                    <span>📚</span> Sou Aluno
                </a>
            </div>

            <div class="scroll-hint" onclick="document.getElementById('saiba-mais').scrollIntoView({behavior:'smooth'})">
                <span>Conheça o projeto</span>
                <div class="scroll-arrow"></div>
            </div>

        </div>
    </section>

    <div class="gradient-divider"></div>

    <script>
        // Lógica de Redirecionamento
        document.getElementById('btn-professor').addEventListener('click', function(e) {
            e.preventDefault();
            const temPerfil = localStorage.getItem('professorNome');
            if (temPerfil) {
                window.location.href = 'professor.html?direct=true';
            } else {
                localStorage.setItem('perfil', 'professor');
                window.location.href = 'professor.html';
            }
        });

        document.getElementById('btn-aluno').addEventListener('click', function(e) {
            e.preventDefault();
            const temNome = localStorage.getItem('alunoNome');
            const temPerfil = localStorage.getItem('perfilAluno');
            if (temNome && temPerfil) {
                window.location.href = 'aluno.html?direct=true';
            } else {
                localStorage.setItem('perfil', 'aluno');
                window.location.href = 'aluno.html';
            }
        });

        const btnNav = document.getElementById('btn-login-nav');
        const savedRole = localStorage.getItem('userRole');
        const savedNomeProf = localStorage.getItem('professorNome');
        const savedNomeAluno = localStorage.getItem('alunoNome');

        if (savedRole === 'professor' && savedNomeProf) {
            btnNav.href = 'professor.html?direct=true';
            btnNav.textContent = 'Minha Conta';
        } else if (savedRole === 'aluno' && savedNomeAluno) {
            btnNav.href = 'aluno.html?direct=true';
            btnNav.textContent = 'Minha Conta';
        }
    </script>
</body>
</html>
