<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saiba Mais – Nexaplus</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --laranja: #000000;
      --laranja-escuro: #ffffff;
      --laranja-bg: #b6dcc7;
      --roxo: #ffffff;
      --amarelo: #ffffff;
      --verde: #000000;
      --azul: #000000;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: radial-gradient(circle at center, rgb(7, 7, 7) 0%, #696969 100% ); }

    header {
      background:rgb(150, 150, 150); border-bottom:3px solid var(--laranja);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 40px; height:68px;
      position:sticky; top:0; z-index:100;
    
    }
    .logo { font-family:'Baloo 2',cursive; font-size:1.5rem; font-weight:800; color:var(--roxo); text-decoration:none; display:flex; align-items:center; gap:8px; }
    .logo span { color:var(--amarelo); }
    .back-btn { display:flex; align-items:center; gap:8px; color:var(--laranja-escuro); font-weight:700; text-decoration:none; border:2px solid var(--laranja); padding:8px 18px;
       border-radius:50px; transition:all 0.2s; }
    .back-btn:hover { background:var(--laranja); color:white; }

    .page-hero {
      background:linear-gradient(135deg, #f3de9b 0%, #bbabd7 100%);
      padding:60px 40px 50px; text-align:center;
    }
    .page-hero .icon { font-size:64px; margin-bottom:16px; display:block; animation:spin 3s ease-in-out infinite; }
    @keyframes spin { 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }
    .page-hero h1 { font-family:'Baloo 2',cursive; font-size:2.4rem; font-weight:800; color:var(--laranja-escuro); margin-bottom:12px; }
    .page-hero p { font-size:1.05rem; color:#ffffff; max-width:620px; margin:0 auto; line-height:1.7; }

    .container { max-width:1100px; margin:0 auto; padding:50px 40px 80px; }

    /* SECTION HEADER */
    .section-header {
      display:flex; align-items:center; gap:16px; margin:50px 0 28px;
      padding-bottom:14px; border-bottom:3px solid var(--laranja-bg);
    }
    .section-header .s-icon { font-size:40px; }
    .section-header h2 { font-family:'Baloo 2',cursive; font-size:1.7rem; color:var(--laranja-escuro); }
    .section-header p { font-size:0.92rem; color:#ffffff; }

    /* SOBRE O PROJETO */
    .sobre-grid { display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center; margin-bottom:60px; }
    @media(max-width:700px){ .sobre-grid { grid-template-columns:1fr; } }

    .sobre-texto h2 { font-family:'Baloo 2',cursive; font-size:2rem; color:var(--roxo); margin-bottom:16px; }
    .sobre-texto p { font-size:1rem; color:#ffffff; line-height:1.8; margin-bottom:14px; }
    .sobre-tags { display:flex; gap:10px; flex-wrap:wrap; }
    .s-tag { padding:7px 18px; border-radius:50px; font-weight:700; font-size:0.88rem; }

    /* PLACEHOLDER DE IMAGEM */
    .img-placeholder {
      border-radius:20px;
      background:linear-gradient(135deg, #000000, #000000);
      border:3px dashed var(--laranja);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; color:var(--laranja-escuro);
      min-height:260px; cursor:pointer; transition:all 0.3s;
      text-align:center; padding:30px;
    }
    .img-placeholder:hover { background:linear-gradient(135deg, #7c7c7c, #7c7c7c); transform:scale(1.01); }
    .img-placeholder .ph-icon { font-size:52px; opacity:0.7; }
    .img-placeholder h3 { font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:800; }
    .img-placeholder p { font-size:0.85rem; opacity:0.7; max-width:220px; }

    /* PLACEHOLDER DE VÍDEO */
    .video-placeholder {
      border-radius:20px;
      background:linear-gradient(135deg, #000000, #000000);
      border:3px dashed rgb(255, 255, 255);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; color:rgb(255, 255, 255); min-height:300px; cursor:pointer;
      transition:all 0.3s; text-align:center; padding:30px; position:relative;
    }
    .video-placeholder:hover { transform:scale(1.01); }
    .play-btn {
      width:72px; height:72px; border-radius:50%;
      background:rgb(0, 0, 0); backdrop-filter:blur(4px);
      display:flex; align-items:center; justify-content:center;
      font-size:30px; border:3px solid rgba(255,255,255,0.4);
      transition:all 0.3s;
    }
    .video-placeholder:hover .play-btn { background:rgb(0, 0, 0); transform:scale(1.1); }
    .video-placeholder h3 { font-family:'Baloo 2',cursive; font-size:1.1rem; }
    .video-placeholder p { font-size:0.82rem; opacity:0.6; max-width:220px; }
    .video-tag { position:absolute; top:16px; left:16px; background:var(--laranja); color:rgb(255, 255, 255); padding:4px 14px; border-radius:50px; font-size:0.75rem; font-weight:800; }

    /* GRID DE VÍDEOS */
    .videos-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:22px; margin-bottom:40px; }

    /* GRID DE IMAGENS */
    .imagens-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:20px; margin-bottom:40px; }

    /* TEXTO PLACEHOLDER */
    .texto-placeholder {
      border-radius:20px; border:3px dashed var(--laranja);
      background:rgb(255, 255, 255); padding:40px;
      min-height:180px; transition:all 0.3s;
    }
    .texto-placeholder:hover { background:var(--laranja-bg); }
    .texto-placeholder h3 { font-family:'Baloo 2',cursive; font-size:1.2rem; color:var(--laranja-escuro); margin-bottom:12px; }
    .texto-placeholder p.hint { color:#000000; font-size:0.9rem; font-style:italic; line-height:1.6; border:2px dashed #000000; border-radius:12px; padding:16px; }
    .texto-placeholder .edit-icon { font-size:28px; margin-bottom:8px; display:block; }

    /* VALORES */
    .valores-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:20px; margin-bottom:40px; }
    .valor-card {
      background:rgb(156, 156, 156); border-radius:20px; padding:28px 22px;
    /*  box-shadow:0 4px 18px rgb(156, 156, 156); text-align:center;*/
      border-top:5px solid var(--laranja); transition:all 0.3s;
    }
    .valor-card:hover { transform:translateY(-6px); box-shadow:0 12px 30px rgb(0, 0, 0); }
    .valor-icon { font-size:44px; margin-bottom:14px; }
    .valor-card h3 { font-family:'Baloo 2',cursive; font-size:1.1rem; color:var(--roxo); margin-bottom:8px; }
    .valor-card p { font-size:0.88rem; color:#ffffff; line-height:1.6; }

    /* EQUIPE */
    .equipe-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:20px; margin-bottom:40px; }
    .equipe-card {
      background:rgb(0, 0, 0); border-radius:20px; padding:26px 20px;
      text-align:center; box-shadow:0 4px 18px rgb(0, 0, 0);
    }
    .equipe-foto {
      width:80px; height:80px; border-radius:50%; margin:0 auto 14px;
      background:var(--laranja-bg); border:4px solid var(--laranja);
      display:flex; align-items:center; justify-content:center; font-size:36px;
    }
    .equipe-foto.placeholder {
      border-style:dashed; cursor:pointer; transition:all 0.2s;
    }
    .equipe-foto.placeholder:hover { background:#000000; }
    .equipe-card h3 { font-family:'Baloo 2',cursive; font-size:1rem; color:var(--roxo); margin-bottom:4px; }
    .equipe-card p { font-size:0.82rem; color:#ffffff; }

    /* TIMELINE */
    .timeline { position:relative; padding-left:30px; margin-bottom:50px; }
    .timeline::before { content:''; position:absolute; left:14px; top:0; bottom:0; width:3px; background:linear-gradient(to bottom, var(--laranja), var(--amarelo)); border-radius:2px; }
    .tl-item { position:relative; margin-bottom:32px; }
    .tl-dot { position:absolute; left:-22px; width:16px; height:16px; border-radius:50%; background:var(--laranja); border:3px solid rgb(255, 255, 255); box-shadow:0 2px 8px rgba(0, 0, 0, 0.4); top:4px; }
    .tl-content { background:rgb(0, 0, 0); border-radius:16px; padding:20px 24px; box-shadow:0 4px 18px rgba(0,0,0,0.07); }
    .tl-content h3 { font-family:'Baloo 2',cursive; color:var(--laranja-escuro); margin-bottom:6px; }
    .tl-content p { font-size:0.9rem; color:#ffffff; line-height:1.6; }
    .tl-date { font-size:0.78rem; color:var(--laranja); font-weight:800; margin-bottom:6px; }

   
  </style>
</head>
